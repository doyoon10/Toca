<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toca — TOEIC 단어장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #ffffff;
      --bg2: #f9f9f9;
      --bg3: #f2f2f2;
      --border: #e5e5e5;
      --border2: #d4d4d4;
      --text: #0a0a0a;
      --text2: #404040;
      --text3: #737373;
      --text4: #a3a3a3;
      --accent: #0a0a0a;
      --accent-inv: #ffffff;
      --tag-noun-bg: #f0f0f0; --tag-noun: #1a1a1a;
      --tag-verb-bg: #f0f0f0; --tag-verb: #1a1a1a;
      --tag-adj-bg:  #f0f0f0; --tag-adj:  #1a1a1a;
      --tag-adv-bg:  #f0f0f0; --tag-adv:  #1a1a1a;
      --tag-prep-bg: #f0f0f0; --tag-prep: #1a1a1a;
      --green-bg: #f0fdf4; --green: #15803d;
      --red-bg:   #fef2f2; --red:   #b91c1c;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 8px;
      --radius-lg: 12px;
    }
    [data-theme="dark"] {
      --bg: #0a0a0a;
      --bg2: #141414;
      --bg3: #1f1f1f;
      --border: #2a2a2a;
      --border2: #3a3a3a;
      --text: #fafafa;
      --text2: #d4d4d4;
      --text3: #a3a3a3;
      --text4: #525252;
      --accent: #fafafa;
      --accent-inv: #0a0a0a;
      --tag-noun-bg: #1f1f1f; --tag-noun: #d4d4d4;
      --tag-verb-bg: #1f1f1f; --tag-verb: #d4d4d4;
      --tag-adj-bg:  #1f1f1f; --tag-adj:  #d4d4d4;
      --tag-adv-bg:  #1f1f1f; --tag-adv:  #d4d4d4;
      --tag-prep-bg: #1f1f1f; --tag-prep: #d4d4d4;
      --green-bg: #052e16; --green: #4ade80;
      --red-bg:   #450a0a; --red:   #f87171;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }
    button, input, select, textarea {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      outline: none;
    }
    button { cursor: pointer; }

    /* ===== LAYOUT ===== */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ===== TOPBAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      gap: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
      flex-shrink: 0;
    }
    .logo sup {
      font-size: 9px;
      font-weight: 400;
      color: var(--text3);
      letter-spacing: 0.05em;
      vertical-align: super;
      margin-left: 2px;
    }
    .topbar-nav {
      display: flex;
      gap: 2px;
      flex: 1;
      padding-left: 8px;
    }
    .topbar-nav button {
      background: none;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text3);
      transition: all 0.15s;
    }
    .topbar-nav button:hover { background: var(--bg3); color: var(--text); }
    .topbar-nav button.active { background: var(--bg3); color: var(--text); font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: all 0.15s;
      font-size: 16px;
    }
    .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }

    /* ===== BODY ===== */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 210px;
      border-right: 1px solid var(--border);
      background: var(--bg);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 12px 0;
    }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text4);
      text-transform: uppercase;
      padding: 10px 16px 4px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px 7px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      color: var(--text3);
      font-size: 13px;
      transition: all 0.12s;
      user-select: none;
    }
    .sidebar-item:hover { background: var(--bg2); color: var(--text2); }
    .sidebar-item.active { border-left-color: var(--accent); background: var(--bg2); color: var(--text); font-weight: 500; }
    .sidebar-item i { font-size: 15px; flex-shrink: 0; }
    .sidebar-badge {
      margin-left: auto;
      font-size: 10px;
      background: var(--bg3);
      color: var(--text4);
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 500;
    }
    .sidebar-item.active .sidebar-badge { background: var(--border); color: var(--text3); }

    /* ===== CONTENT ===== */
    .content { flex: 1; overflow-y: auto; padding: 28px 32px; }

    /* ===== VIEW HEADER ===== */
    .view-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 20px;
    }
    .view-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .view-subtitle { font-size: 13px; color: var(--text4); font-weight: 400; }

    /* ===== FILTER ROW ===== */
    .filter-row { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-label { font-size: 11px; color: var(--text4); margin-right: 4px; }
    .filter-chip {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      transition: all 0.12s;
    }
    .filter-chip:hover { border-color: var(--border2); color: var(--text2); }
    .filter-chip.active { background: var(--accent); color: var(--accent-inv); border-color: var(--accent); }

    /* ===== POS GROUP ===== */
    .pos-group { margin-bottom: 24px; }
    .pos-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .pos-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .pos-tag.noun { background: var(--tag-noun-bg); color: var(--tag-noun); }
    .pos-tag.verb { background: var(--tag-verb-bg); color: var(--tag-verb); }
    .pos-tag.adj  { background: var(--tag-adj-bg);  color: var(--tag-adj); }
    .pos-tag.adv  { background: var(--tag-adv-bg);  color: var(--tag-adv); }
    .pos-tag.prep { background: var(--tag-prep-bg); color: var(--tag-prep); }
    .pos-tag.other{ background: var(--tag-prep-bg); color: var(--tag-prep); }
    .pos-count { font-size: 12px; color: var(--text4); }

    /* ===== WORD CARD ===== */
    .word-card {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 5px;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .word-card:hover { border-color: var(--border2); box-shadow: var(--shadow); }
    .word-card { contain: layout style; }
    .content { will-change: scroll-position; }
    .word-en { font-size: 14px; font-weight: 500; color: var(--text); min-width: 150px; letter-spacing: -0.01em; }
    .word-sep { width: 1px; height: 16px; background: var(--border); margin: 0 14px; flex-shrink: 0; }
    .word-ko { font-size: 13px; color: var(--text2); flex: 1; }
    .word-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
    .accent-pill {
      background: none;
      border: 1px solid var(--border);
      color: var(--text4);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .accent-pill:hover { border-color: var(--accent); color: var(--text); }
    .accent-pill.playing { background: var(--accent); color: var(--accent-inv); border-color: var(--accent); }
    .speed-wrap { display: flex; align-items: center; gap: 5px; padding-left: 8px; border-left: 1px solid var(--border); }
    .speed-wrap label { font-size: 11px; color: var(--text4); }
    .speed-select {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text3);
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--text4);
      font-size: 15px;
      padding: 4px;
      border-radius: 5px;
      transition: all 0.12s;
      display: flex;
      align-items: center;
    }
    .delete-btn:hover { color: var(--red); background: var(--red-bg); }

    /* ===== BULK ACTIONS ===== */
    .bulk-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      margin-bottom: 14px;
      font-size: 13px;
    }
    .bulk-bar.show { display: flex; }
    .bulk-bar-count { color: var(--text2); font-weight: 500; flex: 1; }
    .bulk-delete-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.12s;
    }
    .bulk-delete-btn:hover { opacity: 0.8; }
    .bulk-cancel-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: none;
      color: var(--text3);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      transition: all 0.12s;
    }
    .bulk-cancel-btn:hover { border-color: var(--border2); color: var(--text); }
    .select-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      border-radius: 20px;
      font-size: 12px;
      transition: all 0.12s;
      cursor: pointer;
    }
    .select-all-btn:hover { border-color: var(--border2); color: var(--text2); }
    .select-all-btn.active { background: var(--accent); color: var(--accent-inv); border-color: var(--accent); }
    /* checkbox on word card */
    .word-checkbox {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border2);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: var(--accent);
      margin-right: 4px;
      display: none;
    }
    .select-mode .word-checkbox { display: block; }
    .word-card.selected { background: var(--bg2); border-color: var(--border2); }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text4);
      text-align: center;
      gap: 10px;
    }
    .empty-state i { font-size: 36px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    /* ===== ADD VIEW ===== */
    .add-view { max-width: 600px; }
    .form-row { margin-bottom: 18px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text3); margin-bottom: 6px; display: block; }
    .form-select {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .form-select:focus { border-color: var(--accent); }
    .form-textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      resize: vertical;
      transition: border-color 0.15s;
      line-height: 1.7;
    }
    .form-textarea:focus { border-color: var(--accent); background: var(--bg); }
    .form-textarea::placeholder { color: var(--text4); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: var(--accent-inv); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--border2); background: var(--bg2); }
    .btn-success { background: var(--green); color: white; }
    .btn-success:hover { opacity: 0.9; }
    .status-line {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text4);
      margin-top: 10px;
    }
    .status-line.show { display: flex; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--text3);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .preview-box { display: none; margin-top: 18px; }
    .preview-box.show { display: block; }
    .preview-header { font-size: 12px; color: var(--text4); margin-bottom: 8px; }
    .preview-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 13px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 5px;
      font-size: 13px;
    }
    .preview-item .pi-en { font-weight: 500; min-width: 120px; color: var(--text); }
    .preview-item .pi-ko { color: var(--text3); flex: 1; }
    .preview-item .pi-pos { margin-left: auto; }
    .confirm-row { display: flex; gap: 10px; margin-top: 14px; align-items: center; }

    /* ===== QUIZ VIEW ===== */
    .quiz-setup { max-width: 500px; }
    .quiz-section-label { font-size: 12px; font-weight: 500; color: var(--text3); margin-bottom: 8px; }
    .quiz-scope-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .scope-chip {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      transition: all 0.12s;
    }
    .scope-chip:hover { border-color: var(--border2); color: var(--text2); }
    .scope-chip.active { background: var(--accent); color: var(--accent-inv); border-color: var(--accent); }
    .quiz-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
    .quiz-type-card {
      padding: 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .quiz-type-card:hover { border-color: var(--border2); }
    .quiz-type-card.selected { border-color: var(--accent); background: var(--bg2); }
    .qt-icon { font-size: 20px; color: var(--text3); margin-bottom: 8px; }
    .qt-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .qt-desc { font-size: 11px; color: var(--text4); line-height: 1.5; }

    /* ===== QUIZ GAME ===== */
    .quiz-game { display: none; max-width: 520px; }
    .quiz-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .qp-text { font-size: 12px; color: var(--text4); min-width: 44px; }
    .qp-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .qp-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
    .qp-score {
      font-size: 12px;
      font-weight: 500;
      background: var(--bg3);
      color: var(--text3);
      padding: 3px 10px;
      border-radius: 10px;
    }
    .qcard {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 26px 24px 20px;
    }
    .qcard-type { font-size: 11px; color: var(--text4); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
    .qcard-word { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; color: var(--text); margin-bottom: 14px; }
    .qcard-icon-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      margin-bottom: 14px;
      color: var(--text4);
      font-size: 36px;
    }
    .quiz-audio-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .qaudio-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text3);
      transition: all 0.12s;
    }
    .qaudio-btn:hover { border-color: var(--accent); color: var(--text); }
    .quiz-input-wrap { position: relative; }
    .quiz-input {
      width: 100%;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      transition: border-color 0.15s;
    }
    .quiz-input:focus { border-color: var(--accent); background: var(--bg); }
    .quiz-input.correct { border-color: var(--green); background: var(--green-bg); }
    .quiz-input.wrong { border-color: var(--red); background: var(--red-bg); }
    .quiz-submit {
      width: 100%;
      margin-top: 10px;
      padding: 11px;
      background: var(--accent);
      color: var(--accent-inv);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .quiz-submit:hover { opacity: 0.85; }
    .quiz-feedback {
      display: none;
      margin-top: 10px;
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 13px;
    }
    .quiz-feedback.correct { display: block; background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
    .quiz-feedback.wrong { display: block; background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
    .quiz-next {
      display: none;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: var(--bg3);
      color: var(--text2);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.12s;
    }
    .quiz-next:hover { background: var(--bg2); border: 1px solid var(--border2); }
    .quiz-next.show { display: block; }

    /* ===== QUIZ RESULT ===== */
    .quiz-result {
      display: none;
      text-align: center;
      padding: 50px 20px;
    }
    .result-score { font-size: 60px; font-weight: 700; letter-spacing: -0.04em; color: var(--text); }
    .result-fraction { font-size: 22px; color: var(--text4); font-weight: 300; margin-bottom: 6px; }
    .result-msg { font-size: 14px; color: var(--text3); margin-bottom: 28px; }
    .result-actions { display: flex; gap: 10px; justify-content: center; }

    .quiz-stop-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text4);
      transition: all 0.12s;
      margin-left: 8px;
    }
    .quiz-stop-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

    /* ===== FLASHCARD ===== */
    .flashcard {
      width: 100%;
      max-width: 520px;
      height: 220px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .flashcard-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .flashcard-inner.flipped { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute;
      inset: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      padding: 24px;
      gap: 8px;
    }
    .flashcard-front:hover { border-color: var(--border2); box-shadow: var(--shadow-md); }
    .flashcard-back { transform: rotateY(180deg); background: var(--bg2); border-color: var(--border2); }
    .flashcard-hint { font-size: 11px; color: var(--text4); letter-spacing: 0.08em; text-transform: uppercase; }
    .flashcard-en { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
    .flashcard-ko { font-size: 26px; font-weight: 500; color: var(--text); }
    .flashcard-pos { font-size: 12px; color: var(--text4); }
    .fc-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .fc-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .fc-wrong { background: var(--red-bg); color: var(--red); border: 1.5px solid var(--red); }
    .fc-wrong:hover { opacity: 0.8; }
    .fc-correct { background: var(--green-bg); color: var(--green); border: 1.5px solid var(--green); }
    .fc-correct:hover { opacity: 0.8; }
    .fc-audio-row { display: flex; gap: 8px; }
    .fc-sound-icon {
      font-size: 52px;
      color: var(--text3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.92); }
    }

    /* ===== SEARCH ===== */
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap .ti-search {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text4);
      font-size: 15px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .search-input:focus { outline: none; border-color: var(--border2); }
    .search-input::placeholder { color: var(--text4); }

    /* ===== EDIT MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 28px 24px 20px;
      width: 340px;
      box-shadow: var(--shadow-md);
    }
    .modal h3 { margin: 0 0 18px; font-size: 16px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
    .modal-field input, .modal-field select {
      width: 100%;
      padding: 9px 11px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
    }
    .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions button { flex: 1; }

    /* ===== UNDO TOAST ===== */
    .undo-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 1001;
      display: flex;
      gap: 12px;
      align-items: center;
      white-space: nowrap;
    }
    .undo-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .undo-toast button {
      background: var(--accent);
      color: var(--accent-inv);
      border: none;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ===== SHUFFLE / EDIT BTNS ===== */
    .edit-btn {
      background: none;
      border: none;
      color: var(--text4);
      padding: 4px 6px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      transition: color 0.12s, background 0.12s;
    }
    .edit-btn:hover { color: var(--accent); background: var(--bg2); }

    /* 프리뷰 아이템 삭제 버튼 */
    .preview-item { display: flex; align-items: center; gap: 10px; }
    .pi-del {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text4);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
      flex-shrink: 0;
    }
    .pi-del:hover { color: var(--red); }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: var(--accent-inv);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      transform: translateY(10px);
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px; }
      .quiz-type-grid { grid-template-columns: 1fr; }
      .word-actions .speed-wrap { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- TOPBAR -->
  <header class="topbar">

      </div>
      <div class="sidebar-item" data-nav="lc-p2" onclick="selectPart('lc','p2',this)">
        <i class="ti ti-microphone"></i> Part 2
        <span class="sidebar-badge" id="badge-lc-p2">0</span>
      </div>
      <div class="sidebar-item" data-nav="lc-p3" onclick="selectPart('lc','p3',this)">

        <span class="sidebar-badge" id="badge-lc-p3">0</span>
      </div>
      <div class="sidebar-item" data-nav="lc-p4" onclick="selectPart('lc','p4',this)">

        <span class="sidebar-badge" id="badge-lc-p4">0</span>
      </div>
      <div class="sidebar-section-label" style="margin-top:8px">RC</div>
      <div class="sidebar-item" data-nav="rc-all" onclick="selectPart('rc','all',this)">
        <i class="ti ti-list"></i> 전체
        <span class="sidebar-badge" id="badge-rc-all">0</span>
      </div>
      <div class="sidebar-item" data-nav="rc-p5" onclick="selectPart('rc','p5',this)">
        <i class="ti ti-list-numbers"></i> Part 5
        <span class="sidebar-badge" id="badge-rc-p5">0</span>
      </div>
      <div class="sidebar-item" data-nav="rc-p6" onclick="selectPart('rc','p6',this)">
        <i class="ti ti-align-left"></i> Part 6
        <span class="sidebar-badge" id="badge-rc-p6">0</span>
      </div>
      <div class="sidebar-item" data-nav="rc-p7" onclick="selectPart('rc','p7',this)">
        <i class="ti ti-file-text"></i> Part 7
        <span class="sidebar-badge" id="badge-rc-p7">0</span>
      </div>
    </aside>

    <!-- CONTENT -->
    <main class="content" id="content">

      <!-- ── VIEW: WORDS ── -->
      <section id="view-words">
        <div class="view-header">
          <h1 class="view-title" id="words-title">LC 전체</h1>
          <span class="view-subtitle" id="words-subtitle"></span>
        </div>
        <div class="search-wrap">
          <i class="ti ti-search"></i>
          <input class="search-input" id="search-input" placeholder="영어 또는 한글로 검색..."
            oninput="renderWords()" />
        </div>
        <div class="filter-row">
          <span class="filter-label">품사</span>
          <button class="filter-chip active" onclick="filterPOS('all',this)">전체</button>
          <button class="filter-chip" onclick="filterPOS('noun',this)">명사</button>
          <button class="filter-chip" onclick="filterPOS('verb',this)">동사</button>
          <button class="filter-chip" onclick="filterPOS('adj',this)">형용사</button>
          <button class="filter-chip" onclick="filterPOS('adv',this)">부사</button>
          <button class="filter-chip" onclick="filterPOS('prep',this)">전치사</button>
          <button class="select-all-btn" id="shuffle-btn" onclick="shuffleWords()" style="margin-left:auto">
            <i class="ti ti-arrows-shuffle"></i> 셔플
          </button>
          <button class="select-all-btn" id="select-mode-btn" onclick="toggleSelectMode()">
            <i class="ti ti-checkbox"></i> 선택
          </button>
        </div>
        <div class="bulk-bar" id="bulk-bar">
          <span class="bulk-bar-count" id="bulk-count">0개 선택됨</span>
          <button class="select-all-btn active" id="select-all-btn" onclick="selectAllWords()">
            <i class="ti ti-checks"></i> 전체 선택
          </button>
          <button class="bulk-delete-btn" onclick="deleteSelected()">
            <i class="ti ti-trash"></i> 선택 삭제
          </button>
          <button class="bulk-cancel-btn" onclick="toggleSelectMode()">
            <i class="ti ti-x"></i> 취소
          </button>
        </div>
        <div id="word-list"></div>
      </section>

      <!-- ── VIEW: ADD ── -->
      <section id="view-add" style="display:none">
        <div class="view-header">
          <h1 class="view-title">단어 추가</h1>
        </div>
        <div class="add-view">
          <div class="form-row">
            <label class="form-label">파트 선택</label>
            <select class="form-select" id="add-section" onchange="updatePartSelect()">
              <option value="lc">LC</option>
              <option value="rc">RC</option>
            </select>
            <select class="form-select" id="add-part" style="margin-top:6px">
              <option value="p1">LC Part 1</option>
              <option value="p2">LC Part 2</option>
              <option value="p3">LC Part 3</option>
              <option value="p4">LC Part 4</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-label">단어 입력 — AI가 자동으로 뜻과 품사를 분석합니다</label>
            <textarea class="form-textarea" id="add-input"
              placeholder="예: announce, exhibit, pedestrian, frequently, adjacent, submit&#10;여러 줄로 입력하거나 쉼표로 구분해도 됩니다."></textarea>
          </div>
          <button class="btn btn-primary" id="parse-btn" onclick="parseWords()">
            <i class="ti ti-sparkles"></i> AI로 분석하기
          </button>
          <div class="status-line" id="parse-status">
            <div class="spinner"></div>
            <span>AI가 단어를 분석하고 있습니다...</span>
          </div>
          <div class="preview-box" id="preview-box">
            <p class="preview-header" id="preview-header">분석 결과 — 확인 후 추가하세요</p>
            <div id="preview-list"></div>
            <div class="confirm-row">
              <button class="btn btn-success" onclick="confirmAdd()">
                <i class="ti ti-check"></i> 단어장에 추가
              </button>
              <button class="btn btn-secondary" onclick="cancelAdd()">
                <i class="ti ti-x"></i> 취소
              </button>
            </div>
          </div>
        </div>

      <!-- ── VIEW: QUIZ ── -->

          <h1 class="view-title">퀴즈</h1>
        </div>

        <div class="quiz-setup" id="quiz-setup">
          <p class="quiz-section-label">섹션</p>
          <div class="quiz-scope-row">
            <button class="scope-chip active" data-qsec="lc" onclick="setQuizSection('lc',this)">LC</button>
            <button class="scope-chip" data-qsec="rc" onclick="setQuizSection('rc',this)">RC</button>
          </div>
          <p class="quiz-section-label">퀴즈 범위</p>
          <div class="quiz-scope-row" id="scope-row">
            <button class="scope-chip active" data-scope="all" onclick="setScope('all',this)">전체</button>
            <button class="scope-chip" data-scope="p1" onclick="setScope('p1',this)" id="scope-p1">Part 1</button>
            <button class="scope-chip" data-scope="p2" onclick="setScope('p2',this)" id="scope-p2">Part 2</button>
            <button class="scope-chip" data-scope="p3" onclick="setScope('p3',this)" id="scope-p3">Part 3</button>
            <button class="scope-chip" data-scope="p4" onclick="setScope('p4',this)" id="scope-p4">Part 4</button>
          </div>
          <p class="quiz-section-label">문제 수</p>
          <div class="quiz-scope-row" id="count-row">
            <button class="scope-chip" data-count="10" onclick="setQuizCount(10,this)">10개</button>
            <button class="scope-chip" data-count="20" onclick="setQuizCount(20,this)">20개</button>
            <button class="scope-chip" data-count="30" onclick="setQuizCount(30,this)">30개</button>

            <span class="qp-score" id="qp-score">0점</span>
            <button class="quiz-stop-btn" onclick="resetQuiz()" title="그만하기"><i class="ti ti-x"></i> 그만하기</button>

                <div class="flashcard-front">

                  <div class="fc-sound-icon"><i class="ti ti-volume"></i></div>

                <div class="flashcard-back">
                  <div class="flashcard-hint">정답</div>
                  <div class="flashcard-en" id="fc-en-back"></div>
                  <div class="flashcard-ko" id="fc-ko"></div>
                </div>
              </div>
            </div>
            <div class="fc-actions" id="fc-actions" style="display:none">
              <button class="fc-btn fc-wrong" onclick="fcAnswer(false)"><i class="ti ti-x"></i> 몰랐어요</button>
              <button class="fc-btn fc-correct" onclick="fcAnswer(true)"><i class="ti ti-check"></i> 알았어요</button>
            </div>
            <div class="fc-audio-row">
              <button class="qaudio-btn" onclick="playAudio('us')"><i class="ti ti-volume"></i> 미국식</button>
              <button class="qaudio-btn" onclick="playAudio('uk')"><i class="ti ti-volume"></i> 영국식</button>
              <button class="qaudio-btn" onclick="playAudio('au')"><i class="ti ti-volume"></i> 호주식</button>
            </div>
          </div>

        <!-- Result -->

          </div>
        </div>
      </section>

    </main>
  </div>
</div>

<!-- EDIT MODAL -->

  <div class="modal">

<!-- UNDO TOAST -->
<div class="undo-toast" id="undo-toast">
  <span id="undo-msg"></span>
  <button onclick="undoAdd()">되돌리기</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const ACCENTS = { us: 'en-US', uk: 'en-GB', au: 'en-AU' };
const POS_KO   = { noun:'명사', verb:'동사', adj:'형용사', adv:'부사', prep:'전치사', phrase:'구', other:'기타' };
const POS_ORDER = ['noun','verb','adj','adv','prep','phrase','other'];

let db = JSON.parse(localStorage.getItem('toca-db') || 'null') || {
  lc: {
    p1: [
      {en:'pedestrian',ko:'보행자',pos:'noun'},
      {en:'adjacent',ko:'인접한',pos:'adj'},
      {en:'merchandise',ko:'상품',pos:'noun'},
      {en:'pile',ko:'쌓다 / 더미',pos:'verb'},
    ],
    p2: [
      {en:'confirm',ko:'확인하다',pos:'verb'},
      {en:'announce',ko:'발표하다',pos:'verb'},
      {en:'frequently',ko:'자주',pos:'adv'},
      {en:'deadline',ko:'마감일',pos:'noun'},
    ],
    p3: [
      {en:'postpone',ko:'연기하다',pos:'verb'},
      {en:'reservation',ko:'예약',pos:'noun'},
      {en:'approximately',ko:'대략',pos:'adv'},
      {en:'available',ko:'이용 가능한',pos:'adj'},
    ],
    p4: [
      {en:'submit',ko:'제출하다',pos:'verb'},
      {en:'exhibit',ko:'전시하다',pos:'verb'},
      {en:'considerable',ko:'상당한',pos:'adj'},
      {en:'establish',ko:'설립하다',pos:'verb'},
    ],
  },
  rc: { p5:[], p6:[], p7:[] }
};

function saveDB() {
  localStorage.setItem('toca-db', JSON.stringify(db));
}

// ===================== STATE =====================
let currentSection = 'lc';
let currentPart    = 'all';
let currentPOS     = 'all';
let searchQuery    = '';
let shuffled       = false;
let shuffleOrder   = [];
let parsedWords    = [];
let playbackSpeed  = 1;
let selectMode     = false;
let selectedWords  = new Set();
let lastAdded      = null; // 되돌리기용
let editTarget     = null; // {section, part, idx}
let undoTimer      = null;
let quizType     = 1;
let quizScope    = 'all';
let quizSection  = 'lc';
let quizCount    = 'all';
let quizWords    = [];
let quizIndex    = 0;
let quizScore    = 0;
let quizAnswered = false;
let fcFlipped    = false;

// ===================== THEME =====================
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-icon').className = isDark ? 'ti ti-moon' : 'ti ti-sun';
  localStorage.setItem('toca-theme', html.dataset.theme);
}
(function initTheme() {
  const saved = localStorage.getItem('toca-theme');
  if (saved) {
    document.documentElement.dataset.theme = saved;
    document.getElementById('theme-icon').className = saved === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
  }
})();

// ===================== TABS =====================
function switchTab(btn, tab) {
  document.querySelectorAll('.topbar-nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-words').style.display = tab === 'words' ? '' : 'none';
  document.getElementById('view-add').style.display   = tab === 'add'   ? '' : 'none';
  document.getElementById('view-quiz').style.display  = tab === 'quiz'  ? '' : 'none';
}

// ===================== WORDS VIEW =====================
function getWords(section, part) {
  if (!db[section]) return [];
  if (part === 'all') return Object.values(db[section]).flat();
  return db[section][part] || [];
}

function updateBadges() {
  ['p1','p2','p3','p4'].forEach(p => {
    const n = (db.lc[p] || []).length;
    document.getElementById('badge-lc-' + p).textContent = n;
  });
  document.getElementById('badge-lc-all').textContent = Object.values(db.lc).flat().length;
  if (!db.rc) db.rc = {p5:[],p6:[],p7:[]};
  ['p5','p6','p7'].forEach(p => {
    const n = (db.rc[p] || []).length;
    document.getElementById('badge-rc-' + p).textContent = n;
  });
  document.getElementById('badge-rc-all').textContent = Object.values(db.rc).flat().length;
}

function selectPart(section, part, el) {
  currentSection = section;
  currentPart    = part;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const map = {all:'전체',p1:'Part 1',p2:'Part 2',p3:'Part 3',p4:'Part 4',p5:'Part 5',p6:'Part 6',p7:'Part 7'};
  document.getElementById('words-title').textContent = section.toUpperCase() + ' ' + map[part];
  renderWords();
}

function filterPOS(pos, btn) {
  currentPOS = pos;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWords();
}

function renderWords() {
  const list = getWords(currentSection, currentPart);
  const q = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  let filtered = currentPOS === 'all' ? list : list.filter(w => w.pos === currentPOS);
  if (q) filtered = filtered.filter(w =>
    w.en.toLowerCase().includes(q) || w.ko.toLowerCase().includes(q)
  );
  if (shuffled && shuffleOrder.length) {
    filtered = [...filtered].sort((a, b) => {
      const ai = shuffleOrder.indexOf(a.en + a.pos);
      const bi = shuffleOrder.indexOf(b.en + b.pos);
      return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    });
  }
  document.getElementById('words-subtitle').textContent = list.length + '개 단어';

  if (filtered.length === 0) {
    document.getElementById('word-list').innerHTML = `
      <div class="empty-state">
        <i class="ti ti-books"></i>
        <p>단어가 없습니다. 단어 추가 탭에서 단어를 입력해보세요.</p>
      </div>`;
    return;
  }

  const groups = {};
  filtered.forEach(w => {
    const k = w.pos || 'other';
    if (!groups[k]) groups[k] = [];
    groups[k].push(w);
  });

  let html = '';
  POS_ORDER.forEach(pos => {
    if (!groups[pos]) return;
    html += `<div class="pos-group">
      <div class="pos-group-header">
        <span class="pos-tag ${pos}">${POS_KO[pos] || pos}</span>
        <span class="pos-count">${groups[pos].length}개</span>
      </div>`;
    groups[pos].forEach(w => {
      const enSafe = w.en.replace(/'/g, "\\'");
      const key = w.en + '::' + w.pos;
      const checked = selectedWords.has(key) ? 'checked' : '';
      const selClass = selectedWords.has(key) ? ' selected' : '';
      html += `<div class="word-card${selClass}" id="card-${CSS.escape(key)}">
        <input type="checkbox" class="word-checkbox" ${checked}
          onchange="toggleWordSelect('${enSafe}','${w.pos}',this)" />
        <span class="word-en">${w.en}</span>
        <div class="word-sep"></div>
        <span class="word-ko">${w.ko}</span>
        <div class="word-actions">
          <button class="accent-pill" onclick="speak('${enSafe}','us',this)">🇺🇸 US</button>
          <button class="accent-pill" onclick="speak('${enSafe}','uk',this)">🇬🇧 UK</button>
          <button class="accent-pill" onclick="speak('${enSafe}','au',this)">🇦🇺 AU</button>
          <button class="edit-btn" onclick="openEditModal('${enSafe}','${w.pos}')" title="수정">
            <i class="ti ti-pencil"></i>
          </button>
          <button class="delete-btn" onclick="deleteWord('${enSafe}','${w.pos}')" title="삭제">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  const wordList = document.getElementById('word-list');
  requestAnimationFrame(() => {
    wordList.innerHTML = html;
    if (selectMode) wordList.classList.add('select-mode');
    updateBulkBar();
  });
}

// ===================== SELECT MODE =====================
function toggleSelectMode() {
  selectMode = !selectMode;
  selectedWords.clear();
  const btn = document.getElementById('select-mode-btn');
  const bar = document.getElementById('bulk-bar');
  if (selectMode) {
    btn.classList.add('active');
    bar.classList.add('show');
  } else {
    btn.classList.remove('active');
    bar.classList.remove('show');
  }
  renderWords();
}

function toggleWordSelect(en, pos, checkbox) {
  const key = en + '::' + pos;
  if (checkbox.checked) {
    selectedWords.add(key);
  } else {
    selectedWords.delete(key);
  }
  // update card highlight
  const card = document.getElementById('card-' + CSS.escape(key));
  if (card) card.classList.toggle('selected', checkbox.checked);
  updateBulkBar();
}

function selectAllWords() {
  const list = getWords(currentSection, currentPart);
  const filtered = currentPOS === 'all' ? list : list.filter(w => w.pos === currentPOS);
  const allSelected = filtered.every(w => selectedWords.has(w.en + '::' + w.pos));
  if (allSelected) {
    // deselect all
    filtered.forEach(w => selectedWords.delete(w.en + '::' + w.pos));
  } else {
    // select all
    filtered.forEach(w => selectedWords.add(w.en + '::' + w.pos));
  }
  renderWords();
}

function updateBulkBar() {
  const count = selectedWords.size;
  document.getElementById('bulk-count').textContent = count + '개 선택됨';

  const list = getWords(currentSection, currentPart);
  const filtered = currentPOS === 'all' ? list : list.filter(w => w.pos === currentPOS);
  const allSelected = filtered.length > 0 && filtered.every(w => selectedWords.has(w.en + '::' + w.pos));
  const saBtn = document.getElementById('select-all-btn');
  if (saBtn) {
    saBtn.innerHTML = allSelected
      ? '<i class="ti ti-square-minus"></i> 전체 해제'
      : '<i class="ti ti-checks"></i> 전체 선택';
  }
}

function deleteSelected() {
  if (selectedWords.size === 0) { showToast('선택된 단어가 없습니다.'); return; }
  if (!confirm(`선택한 ${selectedWords.size}개 단어를 삭제할까요?`)) return;
  selectedWords.forEach(key => {
    const [en, pos] = key.split('::');
    ['p1','p2','p3','p4'].forEach(p => {
      db.lc[p] = (db.lc[p] || []).filter(w => !(w.en === en && w.pos === pos));
    });
  });
  const deleted = selectedWords.size;
  selectedWords.clear();
  saveDB();
  updateBadges();
  renderWords();
  showToast(`${deleted}개 단어가 삭제됐습니다.`);
}

function deleteWord(en, pos) {
  if (!confirm(`"${en}" 단어를 삭제할까요?`)) return;
  ['p1','p2','p3','p4'].forEach(p => {
    db.lc[p] = (db.lc[p] || []).filter(w => !(w.en === en && w.pos === pos));
  });
  saveDB();
  updateBadges();
  renderWords();
  showToast(`"${en}" 삭제됨`);
}

// ===================== SHUFFLE =====================
function shuffleWords() {
  const list = getWords(currentSection, currentPart);
  shuffled = !shuffled;
  if (shuffled) {
    shuffleOrder = [...list].sort(() => Math.random() - 0.5).map(w => w.en + w.pos);
    document.getElementById('shuffle-btn').classList.add('active');
    showToast('단어가 셔플됐습니다!');
  } else {
    shuffleOrder = [];
    document.getElementById('shuffle-btn').classList.remove('active');
    showToast('원래 순서로 복원됐습니다.');
  }
  renderWords();
}

// ===================== EDIT MODAL =====================
function openEditModal(en, pos) {
  // 어느 section/part/idx인지 찾기
  for (const sec of ['lc','rc']) {
    if (!db[sec]) continue;
    for (const part of Object.keys(db[sec])) {
      const idx = db[sec][part].findIndex(w => w.en === en && w.pos === pos);
      if (idx !== -1) {
        editTarget = { sec, part, idx };
        document.getElementById('edit-en').value  = en;
        document.getElementById('edit-ko').value  = db[sec][part][idx].ko;
        document.getElementById('edit-pos').value = pos;
        document.getElementById('edit-modal').classList.add('show');
        return;
      }
    }
  }
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('show');
  editTarget = null;
}

function saveEdit() {
  if (!editTarget) return;
  const { sec, part, idx } = editTarget;
  const newEn  = document.getElementById('edit-en').value.trim();
  const newKo  = document.getElementById('edit-ko').value.trim();
  const newPos = document.getElementById('edit-pos').value;
  if (!newEn || !newKo) { showToast('영어와 한국어를 모두 입력해주세요.'); return; }
  db[sec][part][idx] = { en: newEn, ko: newKo, pos: newPos };
  saveDB();
  renderWords();
  closeEditModal();
  showToast('단어가 수정됐습니다!');
}

// ===================== UNDO ADD =====================
function showUndoToast(msg) {
  const el = document.getElementById('undo-toast');
  document.getElementById('undo-msg').textContent = msg;
  el.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    el.classList.remove('show');
    lastAdded = null;
  }, 6000);
}

function undoAdd() {
  if (!lastAdded) return;
  const { section, part, words } = lastAdded;
  words.forEach(w => {
    db[section][part] = db[section][part].filter(x => !(x.en === w.en && x.pos === w.pos));
  });
  saveDB();
  updateBadges();
  renderWords();
  document.getElementById('undo-toast').classList.remove('show');
  lastAdded = null;
  showToast('추가가 취소됐습니다.');
}

// ===================== SPEAK =====================
function speak(word, accent, btn) {
  if (!window.speechSynthesis) { alert('이 브라우저는 음성을 지원하지 않습니다.'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = ACCENTS[accent];
  u.rate = playbackSpeed;
  if (btn) {
    document.querySelectorAll('.accent-pill.playing').forEach(b => b.classList.remove('playing'));
    btn.classList.add('playing');
    u.onend = u.onerror = () => btn.classList.remove('playing');
  }
  window.speechSynthesis.speak(u);
}

// ===================== ADD WORDS =====================
async function parseWords() {
  const input = document.getElementById('add-input').value.trim();
  if (!input) { showToast('단어를 입력해주세요.'); return; }

  const btn = document.getElementById('parse-btn');
  btn.disabled = true;
  document.getElementById('parse-status').classList.add('show');
  document.getElementById('preview-box').classList.remove('show');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `서버 오류 (${res.status})`);
    }
    const data = await res.json();
    parsedWords = data.words;

    renderPreview();
    document.getElementById('preview-header').textContent =
      `분석 결과 (${parsedWords.length}개) — 확인 후 추가하세요`;
    document.getElementById('preview-box').classList.add('show');
  } catch(e) {
    showToast('분석 중 오류가 발생했습니다. 다시 시도해주세요.');
    console.error(e);
  }

  document.getElementById('parse-status').classList.remove('show');
  btn.disabled = false;
}

function confirmAdd() {
  if (!parsedWords.length) return;
  const section = document.getElementById('add-section').value;
  const part    = document.getElementById('add-part').value;
  if (!db[section]) db[section] = {};
  if (!db[section][part]) db[section][part] = [];
  const addedWords = [];
  let skipped = 0;
  parsedWords.forEach(w => {
    // 같은 파트 내 중복 자동 제거
    if (db[section][part].find(x => x.en === w.en)) {
      skipped++;
    } else {
      db[section][part].push(w);
      addedWords.push(w);
    }
  });
  saveDB();
  updateBadges();
  // 되돌리기용 저장
  if (addedWords.length) {
    lastAdded = { section, part, words: addedWords };
    const msg = skipped
      ? `${addedWords.length}개 추가 (중복 ${skipped}개 제외)`
      : `${addedWords.length}개 추가됨`;
    showUndoToast(msg);
  } else {
    showToast('모두 중복된 단어입니다.');
  }
  parsedWords = [];
  document.getElementById('add-input').value = '';
  document.getElementById('preview-box').classList.remove('show');
  document.querySelector('.topbar-nav button[data-tab="words"]').click();
  selectPart(section, part, document.querySelector(`.sidebar-item[data-nav="${section}-${part}"]`));
}

function updatePartSelect() {
  const sec = document.getElementById('add-section').value;
  const sel = document.getElementById('add-part');
  if (sec === 'lc') {
    sel.innerHTML = '<option value="p1">LC Part 1</option><option value="p2">LC Part 2</option><option value="p3">LC Part 3</option><option value="p4">LC Part 4</option>';
  } else {
    sel.innerHTML = '<option value="p5">RC Part 5</option><option value="p6">RC Part 6</option><option value="p7">RC Part 7</option>';
  }
}

function renderPreview() {
  let html = '';
  parsedWords.forEach((w, i) => {
    html += `<div class="preview-item" id="pi-${i}">
      <span class="pi-en">${w.en}</span>
      <span class="pi-ko">${w.ko}</span>
      <span class="pi-pos"><span class="pos-tag ${w.pos}">${POS_KO[w.pos] || w.pos}</span></span>
      <button class="pi-del" onclick="removePreviewItem(${i})" title="제거"><i class="ti ti-x"></i></button>
    </div>`;
  });
  document.getElementById('preview-list').innerHTML = html;
  document.getElementById('preview-header').textContent =
    `분석 결과 (${parsedWords.length}개) — 확인 후 추가하세요`;
}

function removePreviewItem(i) {
  parsedWords.splice(i, 1);
  if (parsedWords.length === 0) {
    document.getElementById('preview-box').classList.remove('show');
  } else {
    renderPreview();
  }
}

function cancelAdd() {
  parsedWords = [];
  document.getElementById('preview-box').classList.remove('show');
}

// ===================== QUIZ =====================
function setQuizSection(sec, btn) {
  quizSection = sec;
  document.querySelectorAll('[data-qsec]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 범위 칩 업데이트
  const scopeRow = document.getElementById('scope-row');
  if (sec === 'lc') {
    scopeRow.innerHTML = `
      <button class="scope-chip active" data-scope="all" onclick="setScope('all',this)">전체</button>
      <button class="scope-chip" data-scope="p1" onclick="setScope('p1',this)">Part 1</button>
      <button class="scope-chip" data-scope="p2" onclick="setScope('p2',this)">Part 2</button>
      <button class="scope-chip" data-scope="p3" onclick="setScope('p3',this)">Part 3</button>
      <button class="scope-chip" data-scope="p4" onclick="setScope('p4',this)">Part 4</button>`;
  } else {
    scopeRow.innerHTML = `
      <button class="scope-chip active" data-scope="all" onclick="setScope('all',this)">전체</button>
      <button class="scope-chip" data-scope="p5" onclick="setScope('p5',this)">Part 5</button>
      <button class="scope-chip" data-scope="p6" onclick="setScope('p6',this)">Part 6</button>
      <button class="scope-chip" data-scope="p7" onclick="setScope('p7',this)">Part 7</button>`;
  }
  quizScope = 'all';
  updateQuizCountInfo();
}

function setScope(scope, btn) {
  quizScope = scope;
  document.querySelectorAll('#scope-row .scope-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateQuizCountInfo();
}

function setQuizCount(count, btn) {
  quizCount = count;
  document.querySelectorAll('#count-row .scope-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateQuizCountInfo();
}

function updateQuizCountInfo() {
  const pool = getWords(quizSection, quizScope === 'all' ? 'all' : quizScope);
  const max = pool.length;
  // max lock: 개수 버튼이 max 초과하면 비활성화
  document.querySelectorAll('#count-row .scope-chip[data-count]').forEach(btn => {
    const c = btn.dataset.count;
    if (c !== 'all') {
      const n = parseInt(c);
      btn.disabled = n > max;
      btn.style.opacity = n > max ? '0.35' : '';
      if (n > max && btn.classList.contains('active')) {
        btn.classList.remove('active');
        quizCount = 'all';
        document.querySelector('#count-row .scope-chip[data-count="all"]').classList.add('active');
      }
    }
  });
  const actual = quizCount === 'all' ? max : Math.min(parseInt(quizCount), max);
  const info = document.getElementById('quiz-count-info');
  info.textContent = max === 0 ? '단어가 없습니다.' : `${max}개 중 ${actual}개 출제`;
}

function setQuizType(t) {
  quizType = t;
  [1,2,3].forEach(i => document.getElementById('qtype-'+i).classList.toggle('selected', t === i));
}

function startQuiz() {
  const pool = getWords(quizSection, quizScope === 'all' ? 'all' : quizScope);
  if (pool.length < 2) { showToast('퀴즈를 시작하려면 최소 2개 이상의 단어가 필요합니다.'); return; }
  const limit = quizCount === 'all' ? pool.length : Math.min(parseInt(quizCount), pool.length);
  quizWords = [...pool].sort(() => Math.random() - 0.5).slice(0, limit);
  quizIndex = 0; quizScore = 0; quizAnswered = false; fcFlipped = false;

  document.getElementById('quiz-setup').style.display  = 'none';
  document.getElementById('quiz-game').style.display   = 'block';
  document.getElementById('quiz-result').style.display = 'none';

  // 모드 전환
  document.getElementById('flashcard-mode').style.display = 'block';

  showQuestion();
}

function showQuestion() {
  const w = quizWords[quizIndex];
  const total = quizWords.length;
  document.getElementById('qp-text').textContent = `${quizIndex + 1} / ${total}`;
  document.getElementById('qp-fill').style.width = ((quizIndex + 1) / total * 100) + '%';
  document.getElementById('qp-score').textContent = quizScore + '점';

  if (quizType === 1) {
    // 발음 듣기 플래시카드 모드
    fcFlipped = false;
    const inner = document.getElementById('flashcard-inner');
    // 트랜지션 끄고 즉시 앞면으로 돌린 뒤 내용 업데이트
    inner.style.transition = 'none';
    inner.classList.remove('flipped');
    document.getElementById('fc-en-back').textContent = w.en;
    document.getElementById('fc-ko').textContent = w.ko;
    document.getElementById('fc-actions').style.display = 'none';
    // 한 프레임 뒤 트랜지션 복원
    requestAnimationFrame(() => {
      inner.style.transition = '';
    });
    // 자동 발음 재생
    const accents = ['us','uk','au'];
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(w.en);
      u.lang = ACCENTS[accents[Math.floor(Math.random()*3)]];
      u.rate = playbackSpeed;
      window.speechSynthesis?.cancel();
      window.speechSynthesis?.speak(u);
    }, 200);
  } else {
    // 입력 모드
    const feedback = document.getElementById('q-feedback');
    feedback.className = 'quiz-feedback';
    const inp = document.getElementById('q-input');
    inp.value = ''; inp.className = 'quiz-input';
    document.getElementById('q-submit').style.display = 'block';
    document.getElementById('q-next').className = 'quiz-next';
    quizAnswered = false;

    if (quizType === 3) {
      document.getElementById('q-type-label').textContent = '발음을 듣고 뜻을 입력하세요';
      document.getElementById('q-display').innerHTML = `<div class="qcard-icon-placeholder"><i class="ti ti-volume"></i></div>`;
      document.getElementById('q-audio-row').style.display = 'flex';
      const accents = ['us','uk','au'];
      setTimeout(() => {
        const u = new SpeechSynthesisUtterance(w.en);
        u.lang = ACCENTS[accents[Math.floor(Math.random()*3)]];
        u.rate = 1;
        window.speechSynthesis?.speak(u);
      }, 300);
    } else {
      document.getElementById('q-type-label').textContent = '단어를 보고 뜻을 입력하세요';
      document.getElementById('q-display').innerHTML = `<div class="qcard-word">${w.en}</div>`;
      document.getElementById('q-audio-row').style.display = 'none';
    }
    inp.focus();
  }
}

function flipCard() {
  if (fcFlipped) return;
  fcFlipped = true;
  document.getElementById('flashcard-inner').classList.add('flipped');
  setTimeout(() => {
    document.getElementById('fc-actions').style.display = 'flex';
  }, 300);
}

function fcAnswer(correct) {
  if (correct) quizScore += 10;
  document.getElementById('qp-score').textContent = quizScore + '점';
  quizIndex++;
  if (quizIndex >= quizWords.length) showResult();
  else { fcFlipped = false; showQuestion(); }
}

function playAudio(accent) {
  const w = quizWords[quizIndex];
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w.en);
  u.lang = ACCENTS[accent];
  u.rate = 1;
  window.speechSynthesis.speak(u);
}

function checkAnswer() {
  if (quizAnswered) return;
  const inp = document.getElementById('q-input');
  const val = inp.value.trim();
  if (!val) return;
  quizAnswered = true;

  const w = quizWords[quizIndex];
  const answers = w.ko.split(/[\/,]/).map(s => s.trim().toLowerCase());
  const correct = answers.some(a => val.toLowerCase().includes(a) || a.includes(val.toLowerCase()));

  const fb = document.getElementById('q-feedback');
  if (correct) {
    quizScore += 10;
    inp.classList.add('correct');
    fb.className = 'quiz-feedback correct';
    fb.textContent = `정답! ✓  "${w.ko}"`;
  } else {
    inp.classList.add('wrong');
    fb.className = 'quiz-feedback wrong';
    fb.textContent = `오답. 정답: "${w.ko}"`;
  }
  document.getElementById('q-submit').style.display = 'none';
  document.getElementById('q-next').className = 'quiz-next show';
  document.getElementById('qp-score').textContent = quizScore + '점';
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizWords.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('quiz-game').style.display   = 'none';
  document.getElementById('quiz-result').style.display = 'block';
  const total   = quizWords.length;
  const correct = Math.round(quizScore / 10);
  const pct     = Math.round(correct / total * 100);
  document.getElementById('r-score').textContent    = correct;
  document.getElementById('r-fraction').textContent = `/ ${total} 정답 (${pct}%)`;
  document.getElementById('r-msg').textContent =
    pct >= 90 ? '완벽합니다! 🎉' :
    pct >= 70 ? '훌륭합니다! 👍' :
    pct >= 50 ? '잘 하셨습니다! 📚' : '더 연습해봐요! 💪';
}

function resetQuiz() {
  document.getElementById('quiz-setup').style.display  = 'block';
  document.getElementById('quiz-game').style.display   = 'none';
  document.getElementById('quiz-result').style.display = 'none';
  updateQuizCountInfo();
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ===================== INIT =====================
updateBadges();
renderWords();
updateQuizCountInfo();
</script>
</body>
</html>
